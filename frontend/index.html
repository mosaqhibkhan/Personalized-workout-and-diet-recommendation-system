<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Workout Recommender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --surface: #111118; --card: #16161f; --border: #2a2a3a;
      --accent: #e8ff00; --accent2: #00e5ff; --text: #f0f0f5; --muted: #6b6b80;
      --danger: #ff4d6d; --success: #00ff9f; --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 60% 40% at 80% 10%, rgba(232,255,0,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 50% at 10% 90%, rgba(0,229,255,0.05) 0%, transparent 60%);
    }
    .wrapper { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }
    header { text-align: center; margin-bottom: 48px; }
    .logo-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(232,255,0,0.08); border: 1px solid rgba(232,255,0,0.2);
      color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; padding: 6px 14px; border-radius: 100px; margin-bottom: 20px;
    }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 7vw, 5rem); letter-spacing: 0.04em; line-height: 0.95; margin-bottom: 14px; }
    h1 em { font-style: normal; color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 15px; font-weight: 300; max-width: 420px; margin: 0 auto; line-height: 1.6; }
    .input-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 36px 40px; margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .input-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    input, select {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      padding: 12px 16px; outline: none; -webkit-appearance: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input::placeholder { color: var(--muted); font-weight: 300; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,0,0.12); }
    select { cursor: pointer; } select option { background: var(--surface); }
    .field.sel { position: relative; }
    .field.sel::after { content: '▾'; position: absolute; right: 14px; bottom: 13px; color: var(--muted); pointer-events: none; }
    .btn-submit {
      width: 100%; padding: 16px 32px; background: var(--accent); color: #0a0a0f;
      border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem; letter-spacing: 0.1em; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .btn-submit:hover { background: #f0ff33; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(232,255,0,0.3); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit.loading { pointer-events: none; background: #333; color: #666; }
    .spinner { display: none; width: 18px; height: 18px; border: 2px solid #555; border-top-color: #aaa; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    .loading .spinner { display: block; } .loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { display: none; background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); border-radius: 10px; padding: 14px 18px; color: var(--danger); font-size: 14px; margin-bottom: 20px; gap: 10px; align-items: center; }
    .error-box.show { display: flex; }
    #results { display: none; }
    #results.show { display: block; animation: fadeUp 0.5s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .plan-hero {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px 40px; margin-bottom: 24px; display: flex; align-items: center;
      justify-content: space-between; gap: 24px; position: relative; overflow: hidden;
    }
    .plan-hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent2), var(--accent)); }
    .plan-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; margin-bottom: 6px; }
    .plan-hero h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.4rem, 3.5vw, 2rem); letter-spacing: 0.05em; }
    .plan-name-badge { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.25); color: var(--accent2); font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.06em; padding: 12px 24px; border-radius: 10px; white-space: nowrap; }
    .plan-msg { margin-top: 10px; font-size: 13px; color: var(--success); }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .section-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .section-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .section-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .workout-icon { background: rgba(232,255,0,0.12); } .diet-icon { background: rgba(0,229,255,0.12); }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.07em; }
    .day-item { display: flex; gap: 16px; padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .day-item:last-child { border-bottom: none; }
    .day-item:hover { background: rgba(255,255,255,0.02); }
    .day-num { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; color: var(--accent); min-width: 42px; padding-top: 2px; }
    .day-num.rest { color: var(--muted); }
    .day-exercises { font-size: 13px; color: #c5c5d5; line-height: 1.55; }
    .diet-item { display: flex; flex-direction: column; gap: 3px; padding: 12px 24px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .diet-item:last-child { border-bottom: none; }
    .diet-key { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); }
    .diet-val { font-size: 13px; color: #c5c5d5; line-height: 1.5; }
    @media (max-width: 640px) {
      .input-card { padding: 24px 20px; } .input-grid { grid-template-columns: 1fr; }
      .results-grid { grid-template-columns: 1fr; } .plan-hero { flex-direction: column; align-items: flex-start; padding: 24px 20px; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo-badge">AI-Powered</div>
    <h1>Personalized<br><em>Workout</em> Plan</h1>
    <p class="subtitle">Enter your stats and get a custom weekly workout &amp; diet plan built by machine learning.</p>
  </header>

  <div class="error-box" id="error-box"><span>⚠️</span><span id="error-text"></span></div>

  <div class="input-card">
    <div class="input-grid">
      <div class="field">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 72" min="20" max="300" step="0.1" />
      </div>
      <div class="field">
        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="e.g. 175" min="100" max="250" step="0.1" />
      </div>
      <div class="field sel">
        <label for="goal">Goal</label>
        <select id="goal">
          <option value="Cut">Cut – Lose Fat</option>
          <option value="Bulk">Bulk – Build Muscle</option>
          <option value="Maintain">Maintain – Stay Fit</option>
        </select>
      </div>
      <div class="field sel">
        <label for="experience">Experience Level</label>
        <select id="experience">
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
      </div>
    </div>
    <button class="btn-submit" id="submit-btn" onclick="getWorkoutPlan()">
      <span class="btn-label">Generate My Plan</span>
      <div class="spinner"></div>
    </button>
  </div>

  <section id="results">
    <div class="plan-hero">
      <div>
        <div class="plan-label">Your Recommended Plan</div>
        <h2 id="plan-name">–</h2>
        <div class="plan-msg">✅ <span id="plan-message"></span></div>
      </div>
      <div class="plan-name-badge" id="plan-badge">–</div>
    </div>
    <div class="results-grid">
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon workout-icon">🏋️</div>
          <div class="section-title">Weekly Workout Schedule</div>
        </div>
        <div id="workout-list"></div>
      </div>
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon diet-icon">🥗</div>
          <div class="section-title">Diet Plan</div>
        </div>
        <div id="diet-list"></div>
      </div>
    </div>
  </section>
</div>

<script>
const API_URL = "http://127.0.0.1:3000/predict";

function showError(msg) {
  document.getElementById("error-text").textContent = msg;
  document.getElementById("error-box").classList.add("show");
  document.getElementById("results").classList.remove("show");
}
function clearError() { document.getElementById("error-box").classList.remove("show"); }
function setLoading(on) { document.getElementById("submit-btn").classList.toggle("loading", on); }

async function getWorkoutPlan() {
  clearError();
  const weight     = parseFloat(document.getElementById("weight").value);
  const height     = parseFloat(document.getElementById("height").value);
  const goal       = document.getElementById("goal").value;
  const experience = document.getElementById("experience").value;

  if (!weight || !height)           { showError("Please enter valid weight and height."); return; }
  if (weight < 20 || weight > 300)  { showError("Weight must be between 20 and 300 kg."); return; }
  if (height < 100 || height > 250) { showError("Height must be between 100 and 250 cm."); return; }

  setLoading(true);
  document.getElementById("results").classList.remove("show");

  try {
    const res  = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ weight, height, goal, experience })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || "Something went wrong."); return; }

    const planClean = data.plan.replace(/_/g, " ");
    document.getElementById("plan-name").textContent    = planClean;
    document.getElementById("plan-badge").textContent   = planClean;
    document.getElementById("plan-message").textContent = data.message;

    const wList = document.getElementById("workout-list");
    wList.innerHTML = "";
    Object.entries(data.workout).forEach(([day, exercises]) => {
      const isRest = exercises.toLowerCase().includes("rest");
      const div = document.createElement("div");
      div.className = "day-item";
      div.innerHTML = `<div class="day-num ${isRest ? 'rest' : ''}">${day.toUpperCase()}</div><div class="day-exercises">${exercises}</div>`;
      wList.appendChild(div);
    });

    const dList = document.getElementById("diet-list");
    dList.innerHTML = "";
    Object.entries(data.diet).forEach(([key, val]) => {
      const div = document.createElement("div");
      div.className = "diet-item";
      div.innerHTML = `<div class="diet-key">${key}</div><div class="diet-val">${val}</div>`;
      dList.appendChild(div);
    });

    document.getElementById("results").classList.add("show");
    document.getElementById("results").scrollIntoView({ behavior: "smooth" });

  } catch (err) {
    showError("Cannot reach Flask server. Make sure you ran: python app.py");
  } finally {
    setLoading(false);
  }
}
</script>
</body>
</html>
